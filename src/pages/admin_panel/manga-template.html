<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="infoMangaWrap">
      <img
        class="img-cover cover js-cover"
        src=""
        alt=""
        width="200"
        height="286"
      />

      <ul class="list-info-manga">
        <li class="item-manga title">
          <h2 class="title-manga js-title">Loading...</h2>
          <span class="status-manga js-status">Loading...</span>
        </li>
        <li class="item-manga">
          <dl class="author">
            <dt class="author-of-manga">Author:</dt>
            <dd class="name-author js-author">...</dd>
          </dl>
        </li>

        <li class="item-manga">
          <dl class="genres-manga js-genres-container">
            <dt class="title">Genres:</dt>
            <dd class="genre js-genres-list">Loading...</dd>
          </dl>
        </li>
      </ul>
    </div>

    <div class="wrapSummary">
      <h2 class="title-summary">SUMMARY:</h2>
      <div class="js-summary-container">Загрузка описания...</div>
    </div>

    <script type="module" src="../../js/manga-page.js"></script>
  </body>
</html>
