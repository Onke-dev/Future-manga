  </head>

  <body>
    <!-- #region header styles -->
    <header class="main_header">
      <div class="container">
        <nav class="nav-list">
          <a class="logo logo-head" href="../../index.html">
            <h1 class="logo-name">Future</h1>
          </a>
          <div class="pages">
            <ul class="list_pages">
              <li class="header_item">
                <a class="item" href="../../index.html" data-key="home">Home</a>
              </li>
              <li class="header_item">
                <a
                  class="item"
                  href="../../pages/manga/manga.html"
                  data-key="manga"
                  >Manga</a
                >
              </li>
              <li class="header_item">
                <a
                  class="item"
                  href="../../pages/about_us/about_us.html"
                  data-key="about"
                  >About us</a
                >
              </li>
            </ul>
          </div>
          <div class="functions">
            <ul class="list_functions">
              <li class="function_header">
                <div class="wrap-search">
                  <input
                    class="search jsHeaderSearch"
                    name="search-name"
                    type="text"
                    placeholder="Search"
                    data-key="search-placeholder"
                  />
                  <button class="btn-search" type="button">
                    <svg class="magnifying-glass" width="24" height="24">
                      <use href="./icon/icon.svg#icon-magnifier"></use>
                    </svg>
                  </button>
                  <ul class="header-search-list js-list-search"></ul>
                </div>
              </li>
              <li class="function_header">
                <a
                  class="account-user"
                  href="../../pages/account/user_account.html"
                >
                  <svg class="icon-user" width="40" height="40">
                    <use href="../../icon/icon.svg#icon-User"></use>
                  </svg>
                </a>
              </li>
              <li class="function_header">
                <button type="button" class="eyes">
                  <svg class="icon-eye" width="40" height="40">
                    <use href="../../icon/icon.svg#icon-Eye"></use>
                  </svg>
                </button>
              </li>
              <li class="function_header">
                <div class="wrap-lg">
                  <select class="lg_func" name="language">
                    <option class="item-lg" value="en">En</option>
                    <option class="item-lg" value="ua">Ua</option>
                  </select>
                  <svg class="icon-locale" width="12" height="8">
                    <use href="../../icon/icon.svg#icon-vector"></use>
                  </svg>
                </div>
              </li>
            </ul>
          </div>
          <button class="burger_btn" type="button" data-menu-open>
            <svg class="burger_icon" width="40" height="40">
              <use
                class="icon_menu"
                href="../../icon/icon.svg#icon-menu-toggle"
              ></use>
            </svg>
          </button>
        </nav>
        <div class="mob-menu" data-menu>
          <div class="container mob-menu-container">
            <button class="close-btn" type="button" data-menu-close>
              <svg class="btn_icon" width="40" height="40">
                <use href="../../icon/icon.svg#icon-menu-close"></use>
              </svg>
            </button>
            <ul class="mob-list_pages">
              <li class="mob-header_item">
                <a class="mob-item" href="../../index.html" data-key="home"
                  >Home</a
                >
              </li>
              <li class="mob-header_item">
                <a
                  class="mob-item"
                  href="../../pages/manga/manga.html"
                  data-key="manga"
                  >Manga</a
                >
              </li>
              <li class="mob-header_item">
                <a
                  class="mob-item"
                  href="../../pages/about_us/about_us.html"
                  data-key="about"
                  >About us</a
                >
              </li>
              <li class="mob-header_item">
                <div class="wrap">
                  <input
                    class="search_mob"
                    name="search-name"
                    type="text"
                    placeholder="Search"
                    data-key="search-placeholder"
                  />
                  <svg class="icon_search" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-magnifier"></use>
                  </svg>
                </div>
              </li>
              <li class="mob-header_item">
                <a
                  class="mob-item"
                  href="../../pages/registration/registration.html"
                  data-key="account"
                  >Account</a
                >
              </li>
              <li class="mob-header_item" id="eye-open">
                <svg class="blindness" width="20" height="20">
                  <use href="../../icon/icon.svg#icon-Eye"></use>
                </svg>
                <a class="mob-item" href="#" data-key="visual-impairments"
                  >For people with visual impairments</a
                >
              </li>
              <li class="mob-header_item">
                <div class="wrap_lg">
                  <select class="lg_func" name="language" id="language-select">
                    <option class="item-lg" value="en">English</option>
                    <option class="item-lg" value="ua">Ukraine</option>
                  </select>
                  <svg class="icon_lg" width="12" height="8">
                    <use href="../../icon/icon.svg#icon-vector"></use>
                  </svg>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>
    <!-- #endregion header styles -->

    <!-- #region sec1 styles -->
    <section class="geolocatio">
      <div class="containerWrap">
        <ul class="list-geo">
          <li class="item-goe home">
            <a class="location" href="../../index.html" data-key="home_location"
              >Home</a
            >
          </li>
          <li class="item-goe">
            <a
              class="location"
              href="../../pages/manga/manga.html"
              data-key="title_location_settings"
              >Manga</a
            >
          </li>
        </ul>
      </div>
    </section>
    <!-- #endregion sec1 styles -->

    <!-- #region main styles -->
    <main class="main_content">
      <div class="container">
        <form class="container-search js-search-form">
          <div class="search-manga">
            <input
              type="text"
              class="find-name"
              name="find-name-manga"
              placeholder="Name"
              aria-label="Search by name"
            />
          </div>
          <div class="list-elems">
            <div class="elems">
              <input
                type="text"
                class="find-name-author"
                name="find-author"
                placeholder="Author"
                aria-label="Search by name"
              />
            </div>
            <div class="elems">
              <div class="wrap-search-status">
                <select
                  class="take-status-manga"
                  name="take-status-manga"
                  aria-label="Select status"
                  aria-placeholder="Status"
                >
                  <option value="" disabled selected hidden>Status</option>
                  <option value="ONG">ONG</option>
                  <option value="END">END</option>
                </select>
                <svg class="icon-select-staus" width="10" height="6">
                  <use href="../../icon/icon.svg#icon-open-select"></use>
                </svg>
              </div>
            </div>
            <div class="elems">
              <div class="custom-multi-select">
                <div class="select-genres js-genres-select">
                  <p class="title-form-manga">Genres</p>
                  <svg class="icon-select" width="10" height="6">
                    <use href="../../icon/icon.svg#icon-open-select"></use>
                  </svg>
                </div>
                <div class="container-elements js-elems-list"></div>
              </div>
            </div>
            <div class="elems">
              <button class="btn-search-manga" type="submit">Search</button>
            </div>
          </div>
        </form>

        <ul class="content-manga js-manga-render"></ul>
        <div id="pagination-numbers" class="pagination-container"></div>
      </div>
    </main>
    <!-- #endregion main styles -->

    <!-- #region footer styles -->
    <footer class="footer-main">
      <div class="container">
        <ul class="footer-list">
          <li class="footer-item">
            <a class="logo" href="../../index.html">
              <span class="logo-name">Future</span>
            </a>
            <p class="info-footer" data-key="paragraph">
              Enjoy reading manga and manhwa for free.
            </p>
          </li>
          <li class="footer-item" id="social">
            <h3 class="title-social" data-key="social-media">Social media</h3>
            <ul class="social-list">
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-instagram"></use>
                  </svg>
                </a>
              </li>
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-twitter"></use>
                  </svg>
                </a>
              </li>
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-facebook"></use>
                  </svg>
                </a>
              </li>
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-linkedin"></use>
                  </svg>
                </a>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </footer>
    <!-- #endregion footer styles -->

    <!-- #region Scripts -->
    <!-- #endregion Scripts -->
  </body>
</html>
