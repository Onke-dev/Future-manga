<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Junge&family=Inter:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>

  <body>
    <!-- #region header styles -->
    <header class="main_header">
      <div class="container">
        <nav class="nav-list">
          <a class="logo logo-head" href="../../index.html">
            <h1 class="logo-name">Future</h1>
          </a>
          <div class="pages">
            <ul class="list_pages">
              <li class="header_item">
                <a class="item" href="../../index.html" data-key="home">Home</a>
              </li>
              <li class="header_item">
                <a class="item" href="#" data-key="manga">Manga</a>
              </li>
              <li class="header_item">
                <a
                  class="item"
                  href="../../pages/about_us/about_us.html"
                  data-key="about"
                  >About us</a
                >
              </li>
            </ul>
          </div>
          <div class="functions">
            <ul class="list_functions">
              <li class="function_header">
                <div class="wrap-search">
                  <input
                    class="search"
                    name="search-name"
                    type="text"
                    placeholder="Search"
                    data-key="search-placeholder"
                  />
                  <svg class="magnifying-glass" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-magnifier"></use>
                  </svg>
                </div>
              </li>
              <li class="function_header">
                <a class="account-user" href="./user_account.html">
                  <svg class="icon-user" width="40" height="40">
                    <use href="../../icon/icon.svg#icon-User"></use>
                  </svg>
                </a>
              </li>
              <li class="function_header">
                <button type="button" class="eyes">
                  <svg class="icon-eye" width="40" height="40">
                    <use href="../../icon/icon.svg#icon-Eye"></use>
                  </svg>
                </button>
              </li>
              <li class="function_header">
                <div class="wrap-lg">
                  <select class="lg_func" name="language">
                    <option class="item-lg" value="en">En</option>
                    <option class="item-lg" value="ua">Ua</option>
                  </select>
                  <svg class="icon-locale" width="12" height="8">
                    <use href="../../icon/icon.svg#icon-vector"></use>
                  </svg>
                </div>
              </li>
            </ul>
          </div>
          <button class="burger_btn" type="button" data-menu-open>
            <svg class="burger_icon" width="40" height="40">
              <use
                class="icon_menu"
                href="../../icon/icon.svg#icon-menu-toggle"
              ></use>
            </svg>
          </button>
        </nav>
        <div class="mob-menu" data-menu>
          <div class="container mob-menu-container">
            <button class="close-btn" type="button" data-menu-close>
              <svg class="btn_icon" width="40" height="40">
                <use href="../../icon/icon.svg#icon-menu-close"></use>
              </svg>
            </button>
            <ul class="mob-list_pages">
              <li class="mob-header_item">
                <a class="mob-item" href="../../index.html" data-key="home"
                  >Home</a
                >
              </li>
              <li class="mob-header_item">
                <a class="mob-item" href="#" data-key="manga">Manga</a>
              </li>
              <li class="mob-header_item">
                <a
                  class="mob-item"
                  href="../../pages/about_us/about_us.html"
                  data-key="about"
                  >About us</a
                >
              </li>
              <li class="mob-header_item">
                <div class="wrap">
                  <input
                    class="search_mob"
                    name="search-name"
                    type="text"
                    placeholder="Search"
                    data-key="search-placeholder"
                  />
                  <svg class="icon_search" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-magnifier"></use>
                  </svg>
                </div>
              </li>
              <li class="mob-header_item">
                <a
                  class="mob-item"
                  href="./user_account.html"
                  data-key="account"
                  >Account</a
                >
              </li>
              <li class="mob-header_item" id="eye-open">
                <svg class="blindness" width="20" height="20">
                  <use href="../../icon/icon.svg#icon-Eye"></use>
                </svg>
                <a class="mob-item" href="#" data-key="visual-impairments"
                  >For people with visual impairments</a
                >
              </li>
              <li class="mob-header_item">
                <div class="wrap_lg">
                  <select class="lg_func" name="language" id="language-select">
                    <option class="item-lg" value="en">English</option>
                    <option class="item-lg" value="ua">Ukraine</option>
                  </select>
                  <svg class="icon_lg" width="12" height="8">
                    <use href="../../icon/icon.svg#icon-vector"></use>
                  </svg>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>
    <!-- #endregion header styles -->

    <!-- #region main styles -->
    <main class="container">
      <!-- #region sec1 styles -->
      <section class="geolocatio">
        <div class="container">
          <ul class="list-geo">
            <li class="item-goe home">
              <a
                class="location"
                href="../../index.html"
                data-key="home_location"
                >Home</a
              >
            </li>
            <li class="item-goe home">
              <a
                class="location"
                href="../../pages/account/user_account.html"
                data-key="title_location_account"
                >My account</a
              >
            </li>
            <li class="item-goe">
              <a
                class="location"
                href="../../pages/admin_panel/admin_panel.html"
                data-key="title_location_account"
                >Admin Panel</a
              >
            </li>
          </ul>
        </div>
      </section>
      <!-- #endregion sec1 styles -->

      <!-- #region sec2 styles -->
      <section class="sec_add_manga">
        <form class="form-manga js-add-manga">
          <h2 class="main-title-form-manga">Add Manga</h2>
          <fieldset class="item-form retreat-down">
            <label for="cover_manga" class="title-form-manga">Cover Manga</label>
            <input
              type="text"
              class="form-input"
              id="cover_manga"
              name="cover_manga"
              placeholder="Alt Manga"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="cover_alt" class="title-form-manga">Alt cover</label>
            <input
              type="text"
              class="form-input"
              id="cover_alt"
              name="cover_alt"
              placeholder="Cover Manga"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="name-manga" class="title-form-manga">Name Manga</label>
            <input
              type="text"
              class="form-input"
              id="name-manga"
              name="name-manga"
              placeholder="Name Manga"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="status-manga" class="title-form-manga">Status</label>
            <select class="manga-status" name="status-manga" id="status-manga">
              <option value="ongoing">ONG</option>
              <option value="completed">COM</option>
            </select>
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="name-author" class="title-form-manga">Name Author</label>
            <input
              type="text"
              class="form-input"
              id="name-author"
              name="name-author"
              placeholder="Name Author"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="genres-manga" class="title-form-manga">Genres</label>
            <select class="manga-genres" name="genres-manga" id="genres-manga">
              <optgroup label="Demographics">
                <option value="shonen">Shonen</option>
                <option value="shojo">Shojo</option>
                <option value="seinen">Seinen</option>
                <option value="josei">Josei</option>
              </optgroup>

              <optgroup label="Main Genres">
                <option value="action">Action</option>
                <option value="adventure">Adventure</option>
                <option value="comedy">Comedy</option>
                <option value="drama">Drama</option>
                <option value="fantasy">Fantasy</option>
                <option value="isekai">Isekai</option>
                <option value="romance">Romance</option>
                <option value="slice-of-life">Slice of Life</option>
                <option value="thriller">Thriller</option>
              </optgroup>
            </select>
          </fieldset>
          <fieldset class="item-form retreat-nearBtn">
            <label for="manga-summary" class="title-form-manga">SUMMARY</label>
            <textarea
              class="summary-content"
              name="manga-summary"
              id="manga-summary"
              placeholder="Summary about manga"
              required
            ></textarea>
          </fieldset>
          <button class="btn-form-manga" type="submit">ADD</button>
        </form>
      </section>
      <!-- #endregion sec2 styles -->

      <!-- #region sec3 styles -->
      <section class="sec-list">
        <div class="wrap-list-manga">
          <h2 class="title-of-list">Manga on the site</h2>
          <ul class="manga-list"></ul>
        </div>
      </section>
      <!-- #endregion sec3 styles -->

      <div class="modalChangeManga">
        <form class="form-manga change-form js-change-manga">
          <h2 class="main-title-form-manga">CHANGE INFO</h2>
          <fieldset class="item-form retreat-down">
            <label for="cover_manga" class="title-form-manga">Cover Manga</label>
            <input
              type="text"
              class="form-input"
              id="cover_manga"
              name="cover_manga"
              placeholder="Alt Manga"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="cover_alt" class="title-form-manga">Alt cover</label>
            <input
              type="text"
              class="form-input"
              id="cover_alt"
              name="cover_alt"
              placeholder="Cover Manga"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="name-manga" class="title-form-manga">Name Manga</label>
            <input
              type="text"
              class="form-input"
              id="name-manga"
              name="name-manga"
              placeholder="Name Manga"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="status-manga" class="title-form-manga">Status</label>
            <select class="manga-status" name="status-manga" id="status-manga">
              <option value="ongoing">ONG</option>
              <option value="completed">COM</option>
            </select>
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="name-author" class="title-form-manga">Name Author</label>
            <input
              type="text"
              class="form-input"
              id="name-author"
              name="name-author"
              placeholder="Name Author"
              required
            />
          </fieldset>
          <fieldset class="item-form retreat-down">
            <label for="genres-manga" class="title-form-manga">Genres</label>
            <select class="manga-genres" name="genres-manga" id="genres-manga">
              <optgroup label="Demographics">
                <option value="shonen">Shonen</option>
                <option value="shojo">Shojo</option>
                <option value="seinen">Seinen</option>
                <option value="josei">Josei</option>
              </optgroup>

              <optgroup label="Main Genres">
                <option value="action">Action</option>
                <option value="adventure">Adventure</option>
                <option value="comedy">Comedy</option>
                <option value="drama">Drama</option>
                <option value="fantasy">Fantasy</option>
                <option value="isekai">Isekai</option>
                <option value="romance">Romance</option>
                <option value="slice-of-life">Slice of Life</option>
                <option value="thriller">Thriller</option>
              </optgroup>
            </select>
          </fieldset>
          <fieldset class="item-form retreat-nearBtn">
            <label for="manga-summary" class="title-form-manga">SUMMARY</label>
            <textarea
              class="summary-content"
              name="manga-summary"
              id="manga-summary"
              placeholder="Summary about manga"
              required
            ></textarea>
          </fieldset>
          <button class="btn-form-manga" type="submit">SAVE</button>
        </form>
      </div>
    </main>
    <!-- #endregion main styles -->

    <!-- #region footer styles -->
    <footer class="footer-main">
      <div class="container">
        <ul class="footer-list">
          <li class="footer-item">
            <a class="logo" href="../../index.html  ">
              <span class="logo-name">Future</span>
            </a>
            <p class="info-footer" data-key="paragraph">
              Enjoy reading manga and manhwa for free.
            </p>
          </li>
          <li class="footer-item" id="social">
            <h3 class="title-social" data-key="social-media">Social media</h3>
            <ul class="social-list">
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-instagram"></use>
                  </svg>
                </a>
              </li>
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-twitter"></use>
                  </svg>
                </a>
              </li>
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-facebook"></use>
                  </svg>
                </a>
              </li>
              <li class="social-item">
                <a class="social-icon" href="#">
                  <svg class="icon" width="24" height="24">
                    <use href="../../icon/icon.svg#icon-linkedin"></use>
                  </svg>
                </a>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </footer>
    <!-- #endregion footer styles -->

    <!-- #region Scripts -->
    <script type="module" src="../../js/admin.js"></script>
    <!-- #endregion Scripts -->
  </body>
</html>
